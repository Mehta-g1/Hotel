{% extends "admin_app/base.html" %}

{% block title %}{{ title }}{% endblock %}
{% block header %}{{ title }}{% endblock %}

{% block content %}
<div class="card admin-card p-4 mx-auto" style="max-width: 600px;">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Full Name</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                <input type="text" name="name" class="form-control" value="{{ cashier.chashier_name }}" required placeholder="John Doe">
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" value="{{ cashier.email }}" required placeholder="cashier@hotel.com">
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-bold text-secondary">
                Password {% if cashier %}<small class="text-muted fw-normal">(Leave blank to keep current)</small>{% endif %}
            </label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" {% if not cashier %}required{% endif %} placeholder="••••••••">
            </div>
        </div>
        
        <div class="d-flex justify-content-end gap-3 mt-5">
            <a href="{% url 'manage_cashiers' %}" class="btn btn-light px-4 border">Cancel</a>
            <button type="submit" class="btn btn-primary px-4 fw-bold">Save Cashier</button>
        </div>
    </form>
</div>
{% endblock %}
